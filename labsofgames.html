<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 3-Hour Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --accent: #00ff41;
            --text: #f0ede6;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        .lab-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin-top: 30px;
        }

        .lab-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            height: 350px;
            position: relative;
            overflow: hidden;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .lab-title {
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* --- Lab 1: Anti-Gravity --- */
        #anti-gravity-zone {
            height: 80%;
            border: 1px dashed #475569;
            position: relative;
            cursor: crosshair;
        }

        .floaty {
            position: absolute;
            transition: transform 0.2s ease-out;
            user-select: none;
        }

        /* --- Lab 2: Chemical Reaction --- */
        #beaker {
            width: 100px;
            height: 120px;
            border: 4px solid #fff;
            border-top: none;
            border-radius: 0 0 20px 20px;
            margin: 40px auto;
            position: relative;
            overflow: hidden;
        }

        #liquid {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 20%;
            background: #22c55e;
            transition: all 0.5s ease;
        }

        .controls {
            text-align: center;
        }

        button {
            background: var(--accent);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- Lab 3: Glitch Prism --- */
        .prism-void {
            height: 80%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .prism {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            transform: rotateX(45deg) rotateZ(45deg);
            animation: rotate 5s infinite linear;
            box-shadow: 0 0 20px var(--accent);
        }

        @keyframes rotate {
            0% {
                transform: rotateX(0) rotateY(0);
                filter: hue-rotate(0deg);
            }

            100% {
                transform: rotateX(360deg) rotateY(360deg);
                filter: hue-rotate(360deg);
            }
        }

        /* --- Lab 4: Secret Log --- */
        .log-box {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #10b981;
            background: #000;
            height: 80%;
            padding: 10px;
            overflow-y: auto;
        }
    </style>
</head>

<body>

    <h1>DEV_LABS_V1.0</h1>
    <p>Experimental modules built in a single caffeine-fueled session.</p>

    <div class="lab-container">
        <div class="lab-card">
            <div class="lab-title">01. Anti-Gravity Zone</div>
            <div id="anti-gravity-zone">
                <span class="floaty" style="top:20%; left:20%; font-size: 2rem;">🍎</span>
                <span class="floaty" style="top:50%; left:60%; font-size: 2rem;">🚀</span>
                <span class="floaty" style="top:30%; left:40%; font-size: 2rem;">💎</span>
            </div>
            <p style="font-size: 0.7rem; color: #94a3b8;">Hover to disrupt gravity vectors.</p>
        </div>

        <div class="lab-card">
            <div class="lab-title">02. Chemical Synthesizer</div>
            <div id="beaker">
                <div id="liquid"></div>
            </div>
            <div class="controls">
                <button onclick="addChemical('#ef4444', '80%', 'Bubbling!')">Acid</button>
                <button onclick="addChemical('#a855f7', '50%', 'Reactive!')">Base</button>
                <button onclick="resetLab()">Clear</button>
            </div>
            <p id="chem-status" style="text-align:center; font-size: 0.8rem; margin-top:10px;">Stable</p>
        </div>

        <div class="lab-card">
            <div class="lab-title">03. Prism Void (Glitch)</div>
            <div class="prism-void">
                <div class="prism"></div>
            </div>
            <p style="font-size: 0.7rem; color: #94a3b8; margin-top: 10px;">Refracting 4D light streams...</p>
        </div>

        <div class="lab-card">
            <div class="lab-title">04. System Matrix</div>
            <div class="log-box" id="matrix-logs">
                > Initializing...<br>
                > Loading Lab 4 Assets...<br>
            </div>
            <button onclick="injectError()" style="margin-top:10px; width:100%; background: #475569;">Simulate
                Glitch</button>
        </div>
    </div>

    <script>
        // Lab 1 Logic: Anti-Gravity
        const zone = document.getElementById('anti-gravity-zone');
        zone.addEventListener('mousemove', (e) => {
            const items = document.querySelectorAll('.floaty');
            items.forEach(item => {
                const speed = 20;
                const x = (window.innerWidth - e.pageX * speed) / 100;
                const y = (window.innerHeight - e.pageY * speed) / 100;
                item.style.transform = `translateX(${x}px) translateY(${y}px)`;
            });
        });

        // Lab 2 Logic: Chemicals
        function addChemical(color, height, status) {
            const liq = document.getElementById('liquid');
            liq.style.background = color;
            liq.style.height = height;
            document.getElementById('chem-status').innerText = status;
            document.getElementById('chem-status').style.color = color;
        }
        function resetLab() {
            addChemical('#22c55e', '20%', 'Stable');
        }

        // Lab 4 Logic: Log Injector
        function injectError() {
            const logs = document.getElementById('matrix-logs');
            const errors = [
                "> ERROR: Gravity leak in Sector 7",
                "> WARNING: Prism refraction over 9000%",
                "> CRITICAL: Coffee supply low",
                "> DEBUG: Re-routing CSS gradients..."
            ];
            const rand = errors[Math.floor(Math.random() * errors.length)];
            logs.innerHTML += rand + "<br>";
            logs.scrollTop = logs.scrollHeight;
        }
    </script>
</body>

</html>
